<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ program.name }} – Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
    <a href="/" class="btn btn-secondary mb-4">← Back</a>

    <div class="card p-4">
        <div class="d-flex align-items-center mb-3">
            <img src="{{ program.icon if program.icon else '/static/icons/default.png' }}" alt="icon" class="me-3" style="width:64px; height: 64px;">
            <h2 class="mb-0">{{ program.name }}</h2>
        </div>

        <p><strong>Version:</strong> {{ program.version }}</p>
        <p><strong>Executable path:</strong> {{ program.exe_path }}</p>
        <p><strong>Registry path:</strong> {{ program.registry_path }}</p>
        <p><strong>License folder:</strong> {{ program.license_folder }}</p>
        <p><strong>License files:</strong></p>
        <ul>
            {% for lic in program.license_names %}
                <li>{{ lic }}</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
