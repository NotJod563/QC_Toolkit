<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="container py-5">

  <div class="d-flex align-items-center justify-content-between mb-4">
    <h2 class="mb-0">Import products</h2>
    <a href="/" class="btn btn-outline-secondary">← Back</a>
  </div>

  <form method="POST" enctype="multipart/form-data" class="card p-4">
    <div class="mb-3">
      <label class="form-label">JSON file</label>
      <input class="form-control" type="file" name="file" accept=".json" required />
      <div class="form-text">Файл має бути у форматі: {"programs": [ ... ]}</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Import mode</label>
      <select class="form-select" name="mode">
        <option value="replace">Replace (перезаписати всі картки)</option>
        <option value="merge">Merge (обʼєднати по id)</option>
      </select>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Import</button>
      <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
  </form>

</body>
</html>
