<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Product</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>

<body class="container py-5">

  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex align-items-center gap-3">
      <h2 class="mb-0">Add product</h2>

      <!-- Icon preview -->
      <img
        id="icon-preview"
        src=""
        alt="icon"
        class="d-none"
        width="32"
        height="32"
      >
    </div>

    <a href="/" class="btn btn-outline-secondary">← Back</a>
  </div>

  <form method="POST" class="card p-4">

    <!-- Executable path -->
    <div class="mb-3">
      <label class="form-label">Executable Path (.exe)</label>
      <input
        type="text"
        class="form-control"
        id="exe_path"
        name="exe_path"
        placeholder="C:\Program Files\App\App.exe"
        required
      />
      <div class="form-text">Після вставки шляху дані підтягнуться автоматично.</div>
    </div>

    <!-- Program name -->
    <div class="mb-3">
      <label class="form-label">Program Name</label>
      <input
        type="text"
        class="form-control"
        id="program_name"
        name="name"
        placeholder="Auto-filled from folder name"
        required
      />
    </div>

    <!-- Directory -->
    <div class="mb-3">
      <label class="form-label">Installation Directory</label>
      <input
        type="text"
        class="form-control"
        id="directory"
        name="directory"
        placeholder="Auto-filled from exe path"
      />
    </div>

    <!-- Registry path -->
    <div class="mb-3">
      <label class="form-label">Registry Path</label>
      <input
        type="text"
        class="form-control"
        name="registry_path"
        placeholder="Computer\HKEY_CURRENT_USER\Software\Vendor\App"
      />
    </div>

    <!-- License folder -->
    <div class="mb-3">
      <label class="form-label">License Folder</label>
      <input
        type="text"
        class="form-control"
        name="license_folder"
        placeholder="C:\Licenses\App"
      />
    </div>

    <!-- License names -->
    <div class="mb-3">
      <label class="form-label">License File Names (comma-separated)</label>
      <input
        type="text"
        class="form-control"
        name="license_names"
        placeholder="license.key, demo.lic"
      />
    </div>

    <!-- Log folders -->
    <div class="mb-3">
      <label class="form-label">Log folders (one per line)</label>
      <textarea class="form-control" name="log_folders" rows="4"
                placeholder="C:\Path\To\Logs"></textarea>
    </div>

    <!-- ID (auto from name) -->
    <input type="hidden" name="id" id="program_id" value="" />

    <!-- Icon path -->
    <input type="hidden" name="icon" id="icon_url" value="" />

    <div class="d-flex gap-2 mt-3">
      <button type="submit" class="btn btn-primary">Add</button>
      <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
  </form>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const exeInput = document.getElementById("exe_path");
      const nameInput = document.getElementById("program_name");
      const idInput = document.getElementById("program_id");
      const dirInput = document.getElementById("directory");
      const iconPreview = document.getElementById("icon-preview");
      const iconHidden = document.getElementById("icon_url");

      function sanitizePath(p) {
        return (p || "").trim().replace(/^"+|"+$/g, "");
      }

      function makeIdFromName(name) {
        return (name || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "_")
          .replace(/[^a-z0-9_]/g, "");
      }

      async function fetchExeInfo() {
        const exePath = sanitizePath(exeInput.value);
        if (!exePath) return;

        try {
          const formData = new FormData();
          formData.append("exe_path", exePath);

          const response = await fetch("/extract_exe_info", {
            method: "POST",
            body: formData
          });

          if (!response.ok) return;

          const result = await response.json();
          if (result.error) return;

          if (result.name) {
            nameInput.value = result.name;
            idInput.value = makeIdFromName(result.name);
          }

          if (result.directory) {
            dirInput.value = result.directory;
          }

          if (result.icon_url) {
            iconPreview.src = result.icon_url + "?v=" + Date.now();
            iconPreview.classList.remove("d-none");
            iconHidden.value = result.icon_url;
          }
        } catch (e) {
          console.error(e);
        }
      }

      exeInput.addEventListener("change", fetchExeInfo);

      exeInput.addEventListener("paste", () => {
        setTimeout(fetchExeInfo, 0);
      });

      let t = null;
      exeInput.addEventListener("input", () => {
        clearTimeout(t);
        t = setTimeout(fetchExeInfo, 600);
      });

      nameInput.addEventListener("input", () => {
        idInput.value = makeIdFromName(nameInput.value);
      });

      document.querySelector("form").addEventListener("submit", () => {
        exeInput.value = sanitizePath(exeInput.value);
      });
    });
  </script>

</body>
</html>
